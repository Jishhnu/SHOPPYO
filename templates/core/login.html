<style>

<body class="dark:bg-background-dark min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #D6E8EE 0%, #F5F9FA 100%);">
<div class="w-full max-w-md">

<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl mb-4 shadow-lg">
<span class="material-icons text-white text-3xl">shopping_bag</span>
</div>
<h1 class="text-3xl font-black tracking-tighter leading-none italic uppercase">
            Shoppy<span class="text-blue-300">O</span>
        </h1>
<p class="text-charcoal/70 dark:text-slate-400 mt-2">Manage your shopping effortlessly</p>
</div>
<!-- Login Card -->
<div class="bg-mist-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-primary/5">
<div class="p-8">
<h2 class="text-xl font-semibold text-charcoal dark:text-slate-100 mb-6">Login to your account</h2>

{% if messages %}
<div class="mb-4 space-y-3">
    {% for message in messages %}
    <div role="alert"
         class="animate-fade-in flex items-center justify-between px-4 py-3 rounded-lg shadow-md text-sm font-medium
        {% if 'error' in message.tags %} bg-red-50 text-red-700 border border-red-300
        {% elif 'success' in message.tags %} bg-green-50 text-green-700 border border-green-300
        {% elif 'warning' in message.tags %} bg-yellow-50 text-yellow-700 border border-yellow-300
        {% else %} bg-blue-50 text-blue-700 border border-blue-300
        {% endif %}">
        
        <!-- Message Text -->
        <span>{{ message }}</span>

        <!-- Close Button -->
        <button class="ml-4 font-bold text-lg opacity-60 hover:opacity-100">
            &times;
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}


<!------------------Form------------------------>
<form method="POST" class="space-y-5">
    {% csrf_token %}
<!-- Email Field -->
<div>
<label class="block text-sm font-medium text-charcoal dark:text-slate-300 mb-1" for="email">Email Address</label>
<div class="relative">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 text-sm">email</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-primary/10 bg-white dark:bg-slate-800 dark:border-slate-700 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-charcoal dark:text-slate-100" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-sm font-medium text-charcoal dark:text-slate-300 mb-1" for="password">Password</label>
<div class="relative">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 text-sm">lock</span>
<input class="w-full pl-10 pr-12 py-3 rounded-lg border border-primary/10 bg-white dark:bg-slate-800 dark:border-slate-700 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-charcoal dark:text-slate-100" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-primary/40 hover:text-primary transition-colors" type="button">
<span class="material-icons text-sm">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center cursor-pointer group">

<span class="ml-2 text-charcoal/80 dark:text-slate-400 group-hover:text-charcoal transition-colors">Remember me</span>

<a class="font-medium text-primary hover:underline dark:text-slate-300" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 rounded-lg shadow-md hover:shadow-lg transition-all active:scale-[0.98]" type="submit">
                        Login to ShoppyO

</form>
<!-- Divider -->

<div class="absolute inset-0 flex items-center">

</div>
<div class="relative flex justify-center text-sm">

</div>

    <span class="text-sm font-semibold text-slate-700">Google</span>
</a>
<button class="flex items-center justify-center px-4 py-2 border border-primary/10 rounded-lg bg-white hover:bg-slate-50 transition-colors dark:bg-slate-800 dark:border-slate-700 dark:hover:bg-slate-700">

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
}

.animate-fade-in {
    animation: fadeIn 0.3s ease-in-out;
}
</style>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const alerts = document.querySelectorAll('[role="alert"]');

    alerts.forEach((el) => {
        let timeout;

        const removeAlert = () => {
            el.style.transition = "opacity 0.4s ease, transform 0.4s ease";
            el.style.opacity = "0";
            el.style.transform = "translateY(-6px)";
            setTimeout(() => el.remove(), 400);
        };

        const startTimer = () => {
            timeout = setTimeout(removeAlert, 3000);
        };

        const stopTimer = () => {
            clearTimeout(timeout);
        };

        // Start auto hide
        startTimer();

        // Pause on hover
        el.addEventListener("mouseenter", stopTimer);
        el.addEventListener("mouseleave", startTimer);

        // Close button
        const closeBtn = el.querySelector("button");
        if (closeBtn) {
            closeBtn.addEventListener("click", () => {
                stopTimer();
                removeAlert();
            });
        }
    });
});
</script>
</body></html>
