<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ShoppyO - Password Reset Complete</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a2d37",
                        "ice-blue": "#D6E8EE",
                        "mist-white": "#F5F9FA",
                        "charcoal": "#333333",
                        "success-green": "#10b981",
                    },
                    fontFamily: {
                        "body": ["Work Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>
<body class="dark:bg-background-dark min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #D6E8EE 0%, #F5F9FA 100%);">
    
    <div class="w-full max-w-md">
        
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="w-20 h-20 bg-white dark:bg-slate-800 flex items-center justify-center rounded-full mb-6 shadow-xl border-4 border-success-green/20 relative">
                <span class="material-symbols-outlined text-success-green text-5xl font-bold">check_circle</span>
                
                <span class="material-symbols-outlined absolute -top-1 -right-1 text-yellow-400 text-2xl animate-pulse">auto_awesome</span>
            </div>
            
            <h1 class="text-3xl font-extrabold text-primary tracking-tight mb-3">All Set!</h1>
            <p class="text-charcoal/70 leading-relaxed font-body max-w-[320px]">
                Your password has been successfully updated. You can now log in to your account.
            </p>
        </div>

        <div class="bg-mist-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-primary/5">
            <div class="p-8 text-center">
                <div class="mb-8">
                    <h2 class="text-xl font-semibold text-charcoal dark:text-slate-100 mb-2">Password Changed</h2>
                    <p class="text-sm text-charcoal/60 dark:text-slate-400">
                        For your security, we recommend not sharing your login credentials with anyone.
                    </p>
                </div>

                <a href="{% url 'login' %}" class="flex items-center justify-center gap-2 w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-lg shadow-md hover:shadow-lg transition-all active:scale-[0.98] group">
                    <span>Login to ShoppyO</span>
                    <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
                </a>
            </div>

            <div class="h-1.5 w-full bg-success-green"></div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-xs text-charcoal/40 uppercase tracking-widest font-bold">
                ShoppyO Security Verified
            </p>
        </div>
    </div>

</body>
</html>
